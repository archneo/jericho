agents:
  - id: kimi-default
    name: Kimi CLI
    type: kimi
    description: General-purpose coding assistant via Kimi CLI
    status_endpoint: http://127.0.0.1:9998/instances
    start_cmd: "kimi web --network --port {{port}} --no-open --dangerously-omit-auth --public"
    env: {}
    capabilities: [code, plan, debug]

  - id: ollama-llama3
    name: Llama 3.1 (Local)
    type: ollama
    model: llama3.1:8b
    description: Fast local LLM inference via Ollama
    ollama_host: http://127.0.0.1:11434
    capabilities: [chat, summarize, classify]

  - id: ollama-codellama
    name: CodeLlama (Local)
    type: ollama
    model: codellama:7b
    description: Code-specialized local LLM
    ollama_host: http://127.0.0.1:11434
    capabilities: [code, autocomplete]

  - id: stable-diffusion
    name: Stable Diffusion
    type: docker
    image: automatic1111/stable-diffusion-webui
    ports: [7860]
    capabilities: [image-gen]

  - id: data-pipeline
    name: Data Pipeline
    type: python
    script: /srv/ai-workspace/pipeline.py
    venv: /srv/ai-workspace/.venv
    schedule: "0 2 * * *"
    capabilities: [etl, report]
